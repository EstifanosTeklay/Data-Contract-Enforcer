kind: DataContract
apiVersion: v3.0.0
id: week3-document-refinery-extractions
info:
  title: Week 3 Document Refinery — Extraction Records
  version: 1.0.0
  owner: week3-team
  description: Auto-generated contract for week3 outputs. Generated at 2026-04-04T20:45:26.022144Z
    from 50 records.
servers:
  local:
    type: local
    path: outputs/week3/extractions.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: confidence fields must remain float 0.0-1.0. Breaking changes require
    blast radius report.
schema:
  doc_id:
    type: string
    required: true
    description: Primary key. UUIDv4. Stable across re-extractions of the same source.
    format: uuid
    unique: true
  source_path:
    type: string
    required: true
    description: 'Column source_path — null fraction: 0.0%'
  source_hash:
    type: string
    required: true
    description: SHA-256 of the source file. Changes iff source content changes.
    pattern: ^[a-f0-9]{64}$
  extracted_facts:
    type: array
    required: true
    description: List of facts extracted from the document. Must be non-empty.
  entities:
    type: array
    required: true
    description: List of entities referenced by extracted facts.
  extraction_model:
    type: string
    required: true
    description: Model identifier. Must match claude-* or gpt-*.
    pattern: ^(claude|gpt)-
  processing_time_ms:
    type: integer
    required: true
    description: Processing duration in milliseconds. Must be > 0.
    minimum: 1
    maximum: 39630.0
  extracted_at:
    type: string
    required: true
    description: ISO 8601 timestamp of extraction completion.
    format: date-time
  token_count.input:
    type: integer
    required: true
    description: 'Column token_count.input — null fraction: 0.0%'
    minimum: 2022.0
    maximum: 5976.0
  token_count.output:
    type: integer
    required: true
    description: 'Column token_count.output — null fraction: 0.0%'
    minimum: 400.0
    maximum: 1196.0
  extracted_facts_confidence:
    type: number
    required: true
    description: Confidence of each extracted fact. MUST be float 0.0-1.0. BREAKING
      CHANGE if changed to 0-100.
    minimum: 0.0
    maximum: 1.0
quality:
  type: SodaChecks
  specification:
    checks for week_3:
    - missing_count(doc_id) = 0
    - duplicate_count(doc_id) = 0
    - row_count >= 25
    - min(extracted_facts_confidence) >= 0.0
    - max(extracted_facts_confidence) <= 1.0
    - avg(extracted_facts_confidence) between 0.01 and 0.99
lineage:
  upstream: []
  downstream:
  - id: week4-cartographer
    description: Cartographer ingests doc_id and extracted_facts as node metadata
    fields_consumed:
    - doc_id
    - extracted_facts
    - extraction_model
    breaking_if_changed:
    - extracted_facts.confidence
    - doc_id
  - id: week7-contract-enforcer
    description: ContractGenerator reads extractions.jsonl for contract generation
    fields_consumed:
    - doc_id
    - extracted_facts
    - entities
    breaking_if_changed:
    - doc_id
    - extracted_facts.confidence
