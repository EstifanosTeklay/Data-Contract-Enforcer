kind: DataContract
apiVersion: v3.0.0
id: week4-lineage-snapshots
info:
  title: Week 4 Brownfield Cartographer — Lineage Snapshots
  version: 1.0.0
  owner: week4-team
  description: Auto-generated contract for week4 outputs. Generated at 2026-04-03T16:31:07.934705Z
    from 1 records.
servers:
  local:
    type: local
    path: outputs/week4/lineage_snapshots.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: confidence fields must remain float 0.0-1.0. Breaking changes require
    blast radius report.
schema:
  snapshot_id:
    type: string
    required: true
    description: 'Column snapshot_id — null fraction: 0.0%'
    format: uuid
    unique: true
  codebase_root:
    type: string
    required: true
    description: The root directory path of the codebase on the local file system
      where the project is located
    x_business_rule: value is not null and length(value) > 0 and (value like '%:\\%'
      or value like '/%')
    x_cross_column_relationship: Represents the source location for the snapshot_id
      and git_commit data; the nodes and edges are derived from analyzing code at
      this codebase_root path
  git_commit:
    type: string
    required: true
    description: A unique SHA-1 hash identifier representing a specific commit in
      a Git version control system, used to track the exact version of the codebase
      at the time of the snapshot
    pattern: ^[a-f0-9]{40}$
    x_business_rule: value matches '^[a-f0-9]{40}$' and value is not null
    x_cross_column_relationship: Links to the specific version of the codebase identified
      by codebase_root at the time indicated by captured_at; represents the state
      of code when nodes and edges were measured in this snapshot_id
  nodes:
    type: string
    required: true
    description: Array of node objects representing files and components in the codebase,
      each containing a label, metadata (language, last_modified timestamp, path,
      purpose), node_id with file path prefix, and type classification (SERVICE, FILE,
      PIPELINE, MODEL, TABLE)
    x_business_rule: 'Must be valid JSON array; each node must contain ''label'',
      ''metadata'', ''node_id'', and ''type'' fields; node_id must follow pattern
      ''file::{path}''; type must be one of: SERVICE, FILE, PIPELINE, MODEL, TABLE'
    x_cross_column_relationship: Nodes are connected via 'edges' column which defines
      relationships between node_ids; nodes represent the codebase structure rooted
      at 'codebase_root' path; snapshot is versioned by 'git_commit' and timestamped
      at 'captured_at'
  edges:
    type: string
    required: true
    description: 'Column edges — null fraction: 0.0%'
  captured_at:
    type: string
    required: true
    description: 'Column captured_at — null fraction: 0.0%'
    format: date-time
quality:
  type: SodaChecks
  specification:
    checks for week_4:
    - missing_count(snapshot_id) = 0
    - duplicate_count(snapshot_id) = 0
    - row_count >= 1
lineage:
  upstream: []
  downstream:
  - id: week7-violation-attributor
    description: ViolationAttributor traverses lineage graph for blame chain
    fields_consumed:
    - nodes
    - edges
    - git_commit
    breaking_if_changed:
    - edges.source
    - edges.target
    - nodes.node_id
