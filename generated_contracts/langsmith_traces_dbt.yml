  - name: outputs.overall_verdict
    description: "Column outputs.overall_verdict \u2014 null fraction: 60.0%"
  - name: outputs.overall_score
    description: "Column outputs.overall_score \u2014 null fraction: 60.0%"
  - name: outputs.confidence
    description: "Column outputs.confidence \u2014 null fraction: 60.0%"
  tests:
  - dbt_utils.expression_is_true:
      expression: total_tokens >= 0 and total_tokens <= 12898.0
      name: total_tokens_range_0_to_12898.0
  - dbt_utils.expression_is_true:
      expression: prompt_tokens >= 0 and prompt_tokens <= 11924.0
      name: prompt_tokens_range_0_to_11924.0
  - dbt_utils.expression_is_true:
      expression: completion_tokens >= 0 and completion_tokens <= 1953.0
      name: completion_tokens_range_0_to_1953.0
  - dbt_utils.expression_is_true:
      expression: total_cost >= 0.0 and total_cost <= 0.054351
      name: total_cost_range_0.0_to_0.054351
  - dbt_utils.expression_is_true:
      expression: outputs.overall_score >= 3.11 and outputs.overall_score <= 4.58
      name: outputs.overall_score_range_3.11_to_4.58
  - dbt_utils.expression_is_true:
      expression: outputs.confidence >= 0.68 and outputs.confidence <= 0.94
      name: outputs.confidence_range_0.68_to_0.94
  - dbt_utils.expression_is_true:
      expression: end_time > start_time
      name: end_time_after_start_time
  - dbt_utils.expression_is_true:
      expression: total_cost >= 0
      name: total_cost_non_negative
