version: 2
models:
- name: langsmith_traces
  description: "LangSmith Trace Records \u2014 AI Pipeline Observability"
  columns:
  - name: id
    description: "Column id \u2014 null fraction: 0.0% [format: uuid]"
    tests:
    - not_null
    - unique
  - name: name
    description: The name or identifier of the execution trace, representing a specific
      chain or process being tracked. Examples include document extraction and judicial
      verdict processing chains.
    tests:
    - not_null
    - accepted_values:
        values:
        - document-extraction-chain
        - judicial-verdict-chain
  - name: run_type
    description: "Column run_type \u2014 null fraction: 0.0%"
    tests:
    - not_null
    - accepted_values:
        values:
        - chain
        - llm
  - name: error
    description: Stores error information or exception details that occurred during
      the execution of a trace, typically null when the trace completed successfully
  - name: start_time
    description: "Column start_time \u2014 null fraction: 0.0% [format: date-time]"
    tests:
    - not_null
  - name: end_time
    description: 'Must be > start_time. [format: date-time]'
    tests:
    - not_null
  - name: total_tokens
    description: "Column total_tokens \u2014 null fraction: 0.0%"
    tests:
    - not_null
  - name: prompt_tokens
    description: "Column prompt_tokens \u2014 null fraction: 0.0%"
    tests:
    - not_null
  - name: completion_tokens
    description: total_tokens = prompt_tokens + completion_tokens
    tests:
    - not_null
  - name: total_cost
    description: The total monetary cost associated with executing a trace, measured
      in dollars with precision to six decimal places
    tests:
    - not_null
  - name: tags
    description: "Column tags \u2014 null fraction: 0.0%"
    tests:
    - not_null
    - accepted_values:
        values:
        - '["week3", "extraction"]'
        - '["week2", "verdict", "judicial"]'
