    description: The name or identifier of the execution trace, representing a specific
      chain or process being tracked. Examples include document extraction and judicial
      verdict processing chains.
    enum:
    - document-extraction-chain
    - judicial-verdict-chain
    x_business_rule: value is not null and length(value) > 0 and value matches pattern
      '*-chain'
    x_cross_column_relationship: This name identifies the specific trace instance
      referenced by 'id' and describes what operation was performed during the time
      period between 'start_time' and 'end_time'. The 'run_type' likely categorizes
      the execution type while 'name' provides the specific chain identifier.
  run_type:
    type: string
    required: true
    description: 'Column run_type ó null fraction: 0.0%'
    enum:
    - chain
    - llm
  error:
    type: string
    required: false
    description: Stores error information or exception details that occurred during
      the execution of a trace, typically null when the trace completed successfully
    x_business_rule: value IS NULL OR length(value) > 0
    x_cross_column_relationship: When error is NOT NULL, end_time should be populated
      indicating when the error occurred; error presence may correlate with specific
      run_type values that failed
  start_time:
    type: string
    required: true
    description: 'Column start_time ó null fraction: 0.0%'
    format: date-time
  end_time:
