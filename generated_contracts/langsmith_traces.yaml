    required: true
    description: 'Column prompt_tokens ó null fraction: 0.0%'
    minimum: 0
    maximum: 11924.0
  completion_tokens:
    type: integer
    required: true
    description: total_tokens = prompt_tokens + completion_tokens
    minimum: 0
    maximum: 1953.0
  total_cost:
    type: number
    required: true
    description: The total monetary cost associated with executing a trace, measured
      in dollars with precision to six decimal places
    minimum: 0.0
    maximum: 0.054351
    x_business_rule: value >= 0 and value is numeric
    x_cross_column_relationship: Related to 'run_type' which may determine cost calculation
      method; may aggregate to null or 0 if 'error' is present; cost accumulates from
      'start_time' until completion
