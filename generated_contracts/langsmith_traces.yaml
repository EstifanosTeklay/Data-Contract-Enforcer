id: langsmith-trace-records
info:
  title: LangSmith Trace Records ó AI Pipeline Observability
  version: 1.0.0
  owner: traces-team
  description: Auto-generated contract for traces outputs. Generated at 2026-04-03T16:31:33.775558Z
    from 25 records.
servers:
  local:
    type: local
    path: outputs/traces/runs.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: confidence fields must remain float 0.0-1.0. Breaking changes require
    blast radius report.
schema:
  id:
    type: string
    required: true
    description: 'Column id ó null fraction: 0.0%'
