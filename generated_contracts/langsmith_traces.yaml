quality:
  type: SodaChecks
  specification:
    checks for traces:
    - missing_count(id) = 0
    - duplicate_count(id) = 0
    - row_count >= 12
    - min(outputs.confidence) >= 0.0
    - max(outputs.confidence) <= 1.0
    - avg(outputs.confidence) between 0.01 and 0.99
    - min(total_cost) >= 0.0
    - missing_count(run_type) = 0
