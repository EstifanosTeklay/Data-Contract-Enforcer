kind: DataContract
apiVersion: v3.0.0
id: week2-verdict-records
info:
  title: Week 2 Digital Courtroom — Verdict Records
  version: 1.0.0
  owner: week2-team
  description: Auto-generated contract for week2 outputs. Generated at 2026-04-03T16:30:22.023095Z
    from 1 records.
servers:
  local:
    type: local
    path: outputs/week2/verdicts.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: confidence fields must remain float 0.0-1.0. Breaking changes require
    blast radius report.
schema:
  verdict_id:
    type: string
    required: true
    description: 'Column verdict_id — null fraction: 0.0%'
    format: uuid
    unique: true
  target_ref:
    type: string
    required: true
    description: File path reference pointing to the source code module or file being
      evaluated, typically a Python module path in the codebase
    x_business_rule: value is not null and length(value) > 0 and value matches pattern
      '*.py' or similar file extension
    x_cross_column_relationship: Links to verdict_id and rubric_id as the target file
      being assessed; each target_ref can have multiple verdicts with different rubric
      versions and overall scores
  rubric_id:
    type: string
    required: true
    description: 'Column rubric_id — null fraction: 0.0%'
    format: uuid
  rubric_version:
    type: string
    required: true
    description: 'Column rubric_version — null fraction: 0.0%'
  overall_verdict:
    type: string
    required: true
    description: Final pass/fail determination for an evaluation based on rubric criteria
      and scoring thresholds
    enum:
    - PASS
    - FAIL
    - WARN
    x_business_rule: value in ('PASS', 'FAIL', 'PENDING', 'NOT_EVALUATED')
    x_cross_column_relationship: Derived from overall_score applied against rubric_version
      criteria; references verdict_id as primary identifier and rubric_id for evaluation
      standards
  overall_score:
    type: number
    required: true
    description: 'Column overall_score — null fraction: 0.0%'
    minimum: 1.0
    maximum: 5.0
  confidence:
    type: number
    required: true
    description: Confidence in verdict. Float 0.0-1.0.
    minimum: 0.0
    maximum: 1.0
  evaluated_at:
    type: string
    required: true
    description: 'Column evaluated_at — null fraction: 0.0%'
    format: date-time
  scores.code_quality:
    type: string
    required: true
    description: 'Column scores.code_quality — null fraction: 0.0%'
  scores.test_coverage:
    type: string
    required: true
    description: 'Column scores.test_coverage — null fraction: 0.0%'
  scores.documentation:
    type: string
    required: true
    description: 'Column scores.documentation — null fraction: 0.0%'
  scores.security:
    type: string
    required: true
    description: 'Column scores.security — null fraction: 0.0%'
quality:
  type: SodaChecks
  specification:
    checks for week_2:
    - missing_count(verdict_id) = 0
    - duplicate_count(verdict_id) = 0
    - row_count >= 1
    - min(confidence) >= 0.0
    - max(confidence) <= 1.0
    - avg(confidence) between 0.01 and 0.99
    - invalid_values(overall_verdict, ['PASS','FAIL','WARN']) = 0
lineage:
  upstream: []
  downstream: []
