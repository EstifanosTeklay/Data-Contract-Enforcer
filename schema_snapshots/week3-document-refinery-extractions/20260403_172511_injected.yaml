contract_id: week3-document-refinery-extractions
snapshot_timestamp: '2026-04-03T17:25:11.280012Z'
source_path: outputs/week3/extractions.jsonl
schema:
  doc_id:
    type: string
    required: true
    description: Primary key. UUIDv4. Stable across re-extractions of the same source.
    format: uuid
    unique: true
  extracted_facts:
    type: array
    required: true
    description: An array of fact objects extracted from source documents, where each
      fact contains a unique identifier, confidence score, associated entity references,
      page reference, source excerpt, and extracted text content from the document
    x_business_rule: 'Must be a valid JSON array; each fact object must contain required
      fields: fact_id (UUID), confidence (float 0-1), entity_refs (array of UUIDs),
      page_ref (integer >= 1), source_excerpt (string), and text (string); all facts
      in array should reference the same source document'
    x_cross_column_relationship: Entity UUIDs in entity_refs field must correspond
      to entities in the 'entities' column; facts are extracted from the document
      identified by 'doc_id' and 'source_path'; extraction_model determines the algorithm
      used to generate these facts
  entities:
    type: array
    required: true
    description: JSON array containing structured metadata about entities extracted
      from documents, where each entity has a unique identifier, canonical value,
      name, and classification type. All samples show references to 'MCF.pdf' files
      classified as 'OTHER' type entities.
    x_business_rule: 'value must be valid JSON array format AND each entity object
      must contain fields: entity_id (UUID format), canonical_value (string), name
      (string), and type (string enum)'
    x_cross_column_relationship: Related to doc_id as the parent document identifier;
      entities are likely extracted from the file specified in source_path; the extracted_facts
      column may reference or correlate with these entity_ids; extraction_model indicates
      the AI/ML model used to identify these entities
  extraction_model:
    type: string
    required: true
    description: Identifier of the AI model used to extract information from the source
      document, specifying the exact version of the extraction engine employed
    pattern: ^(claude|gpt)-
    x_business_rule: value is not null and length(value) > 0 and value matches pattern
      '^[a-z0-9\-\.]+$'
    x_cross_column_relationship: Links to extracted_facts and entities columns as
      the model that generated those extraction results; associated with source_path
      and source_hash to track which model version processed each source document
  processing_time_ms:
    type: integer
    required: true
    description: Processing duration in milliseconds. Must be > 0.
    minimum: 1
    maximum: 39630.0
  extracted_at:
    type: string
    required: true
    description: ISO 8601 timestamp of extraction completion.
    format: date-time
  token_count.input:
    type: integer
    required: true
    description: "Column token_count.input \u2014 null fraction: 0.0%"
    minimum: 2022.0
    maximum: 5976.0
  token_count.output:
    type: integer
    required: true
    description: "Column token_count.output \u2014 null fraction: 0.0%"
    minimum: 400.0
    maximum: 1196.0
