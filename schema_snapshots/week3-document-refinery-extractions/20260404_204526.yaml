contract_id: week3-document-refinery-extractions
snapshot_timestamp: '2026-04-04T20:45:26.036673Z'
source_path: outputs/week3/extractions.jsonl
schema:
  doc_id:
    type: string
    required: true
    description: Primary key. UUIDv4. Stable across re-extractions of the same source.
    format: uuid
    unique: true
  source_path:
    type: string
    required: true
    description: "Column source_path \u2014 null fraction: 0.0%"
  source_hash:
    type: string
    required: true
    description: SHA-256 of the source file. Changes iff source content changes.
    pattern: ^[a-f0-9]{64}$
  extracted_facts:
    type: array
    required: true
    description: List of facts extracted from the document. Must be non-empty.
  entities:
    type: array
    required: true
    description: List of entities referenced by extracted facts.
  extraction_model:
    type: string
    required: true
    description: Model identifier. Must match claude-* or gpt-*.
    pattern: ^(claude|gpt)-
  processing_time_ms:
    type: integer
    required: true
    description: Processing duration in milliseconds. Must be > 0.
    minimum: 1
    maximum: 39630.0
  extracted_at:
    type: string
    required: true
    description: ISO 8601 timestamp of extraction completion.
    format: date-time
  token_count.input:
    type: integer
    required: true
    description: "Column token_count.input \u2014 null fraction: 0.0%"
    minimum: 2022.0
    maximum: 5976.0
  token_count.output:
    type: integer
    required: true
    description: "Column token_count.output \u2014 null fraction: 0.0%"
    minimum: 400.0
    maximum: 1196.0
  extracted_facts_confidence:
    type: number
    required: true
    description: Confidence of each extracted fact. MUST be float 0.0-1.0. BREAKING
      CHANGE if changed to 0-100.
    minimum: 0.0
    maximum: 1.0
