schema:
  verdict_id:
    type: string
    required: true
    description: "Column verdict_id \u2014 null fraction: 0.0%"
    format: uuid
    unique: true
  target_ref:
    type: string
    required: true
    description: File path reference pointing to the source code module or file being
      evaluated, typically a Python module path in the codebase
    x_business_rule: value is not null and length(value) > 0 and value matches pattern
      '*.py' or similar file extension
    x_cross_column_relationship: Links to verdict_id and rubric_id as the target file
      being assessed; each target_ref can have multiple verdicts with different rubric
      versions and overall scores
  rubric_id:
    type: string
    required: true
    description: "Column rubric_id \u2014 null fraction: 0.0%"
    format: uuid
  rubric_version:
    type: string
    required: true
    description: "Column rubric_version \u2014 null fraction: 0.0%"
  overall_verdict:
    type: string
    required: true
    description: Final pass/fail determination for an evaluation based on rubric criteria
      and scoring thresholds
    enum:
    - PASS
    - FAIL
    - WARN
    x_business_rule: value in ('PASS', 'FAIL', 'PENDING', 'NOT_EVALUATED')
    x_cross_column_relationship: Derived from overall_score applied against rubric_version
      criteria; references verdict_id as primary identifier and rubric_id for evaluation
      standards
  overall_score:
    type: number
    required: true
    description: "Column overall_score \u2014 null fraction: 0.0%"
    minimum: 1.0
    maximum: 5.0
  confidence:
    type: number
    required: true
    description: Confidence in verdict. Float 0.0-1.0.
    minimum: 0.0
    maximum: 1.0
  evaluated_at:
