  description:
    type: string
    required: true
    description: A human-readable text description of the intent or operation being
      tracked, typically including an intent identifier, the type of operation performed,
      and the mutation or configuration method used
    enum:
    - 'Intent INT-001: write_to_file operation via AST_REFACTOR mutation'
    - 'Synthetic padding: configuration update for module init'
    x_business_rule: value IS NOT NULL AND LENGTH(value) > 0 AND (value LIKE 'Intent
      INT-%' OR value LIKE 'Synthetic padding:%')
    x_cross_column_relationship: The intent ID prefix in this description (e.g., 'INT-001')
      should correspond to the intent_id column value. The code_refs column likely
      contains references to files/locations mentioned in operations like 'write_to_file'
      or 'module init'. The governance_tags column may categorize the type of mutation
      or operation described here.
  code_refs:
    type: string
    required: true
    description: JSON array containing code references with metadata including confidence
      scores (0-1 range), file paths, line number ranges (start/end), and symbol names
      that link to source code locations
    enum:
    - '[{"confidence": 0.87, "file": "src/config.py", "line_end": 50, "line_start":
      1, "symbol": "write_to_file"}]'
    - '[{"confidence": 0.75, "file": "src/config.py", "line_end": 20, "line_start":
      1, "symbol": "load_config"}]'
    x_business_rule: 'value is valid JSON array AND each element contains required
      fields: confidence (numeric 0-1), file (string), line_end (integer > 0), line_start
      (integer > 0 where line_start <= line_end), symbol (string)'
    x_cross_column_relationship: Related to intent_id as these code references likely
      implement or support the intent described in the description column; governance_tags
      may categorize the sensitivity or access controls for these code locations
  governance_tags:
    type: string
    required: true
    description: An array of governance-related tags or labels applied to classify
      the record for compliance, auditing, or regulatory purposes
    x_business_rule: value IS NULL OR (JSON_VALID(value) AND JSON_TYPE(value) = 'array')
    x_cross_column_relationship: Tags may categorize the intent described in 'description'
      column and relate to auditing requirements tracked via 'created_at' timestamp
